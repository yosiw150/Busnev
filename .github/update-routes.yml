name: Update Routes DB

on:
  schedule:
    # Run every Sunday at 03:00 UTC (05:00 Israel time)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build routes.json from GTFS
        run: python build_routes.py

      - name: Commit and push routes.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routes.json
          git diff --staged --quiet || git commit -m "Update routes.json $(date -u +%Y-%m-%d)"
          git push
