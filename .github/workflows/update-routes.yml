name: Update Routes DB
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: curl -o gtfs.zip "ftp://gtfs.mot.gov.il/israel-public-transportation.zip"
      - run: python build_routes.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add routes.json
          git diff --staged --quiet || git commit -m "routes $(date -u +%Y-%m-%d)"
          git push

