<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>נווט נהג אוטובוס</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--s:#111827;--s2:#1a2235;
  --a:#f59e0b;--g:#10b981;--r:#ef4444;--b:#3b82f6;
  --t:#f1f5f9;--m:#64748b;--br:#1e2d45;
  --fs:1; /* font scale — night mode sets to 1.25 */
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;height:100dvh}

/* ── NIGHT MODE ── */
body.night{--bg:#000;--s:#0a0a0a;--s2:#111;--br:#222;--t:#fff;--m:#aaa}
body.night #map .leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(.85) contrast(1.1)}

/* ── SETUP ── */
#setup{display:flex;flex-direction:column;align-items:center;height:100dvh;overflow-y:auto;padding:16px;gap:12px;background:radial-gradient(ellipse at 50% 0,#1a2c4a,var(--bg) 55%)}
.logo-e{font-size:52px;text-align:center;display:block;animation:pu 2s ease-in-out infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.logo-t{font-size:30px;font-weight:900;color:var(--a);letter-spacing:3px;text-align:center}
.logo-s{font-size:12px;color:var(--m);text-align:center}
.card{background:var(--s);border:1px solid var(--br);border-radius:16px;padding:16px;width:100%;max-width:440px}
.lbl{font-size:10px;font-weight:700;color:var(--m);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:8px}
.cops{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cop{padding:6px 14px;border-radius:20px;border:1px solid var(--br);background:var(--s2);color:var(--m);font-size:13px;cursor:pointer}
.cop.on{border-color:var(--a);color:var(--a);background:rgba(245,158,11,.1)}
.row2{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:6px}
input[type=number]{background:var(--s2);border:1px solid var(--br);color:var(--t);padding:13px 14px;border-radius:10px;font-size:22px;width:100%;outline:none;-webkit-appearance:none}
input[type=number]:focus{border-color:var(--a)}
.bf{background:var(--a);color:#000;border:none;padding:13px 18px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap}
.bf:disabled{opacity:.45;cursor:not-allowed}
.fst{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:6px;display:none;align-items:center;gap:9px}
.fst.ld{display:flex;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#93c5fd}
.fst.ok{display:flex;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.fst.er{display:flex;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.spin{width:15px;height:15px;min-width:15px;border:2px solid rgba(147,197,253,.3);border-top-color:#93c5fd;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.sbox{background:var(--s2);border:1px solid var(--br);border-radius:10px;overflow:hidden;margin-top:10px}
.shdr{padding:7px 12px;border-bottom:1px solid var(--br);font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.ss{max-height:200px;overflow-y:auto}
.srow{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(30,45,69,.5);font-size:12px}
.srow:last-child{border-bottom:none}
.sn{background:var(--a);color:#000;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.sc{flex:1;min-width:0}.snm{font-weight:600;font-size:13px}.sco{font-size:10px;color:var(--m);font-family:monospace}
.sdg{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;flex-shrink:0}
.ds{background:rgba(59,130,246,.15);color:#93c5fd}.dr,.dl{background:rgba(245,158,11,.15);color:#fcd34d}.da{background:rgba(16,185,129,.15);color:#6ee7b7}
.adr{display:grid;grid-template-columns:1fr auto auto;gap:6px;margin-top:10px}
.adr input{padding:8px 10px;font-size:13px;background:var(--s2);border:1px solid var(--br);color:var(--t);border-radius:8px;outline:none}
select{background:var(--s2);border:1px solid var(--br);color:var(--t);padding:8px 10px;border-radius:8px;font-size:12px;outline:none;font-family:inherit}
.badd{background:var(--s2);border:1px solid var(--br);color:var(--a);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:18px}
.bst{width:100%;max-width:440px;background:var(--a);color:#000;border:none;padding:15px;border-radius:14px;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,.3);font-family:inherit}
.bst:disabled{opacity:.4;cursor:not-allowed}

/* ── NAV ── */
#nav{display:none;flex-direction:column;height:100dvh}

/* Top bar — bigger text */
.tb{background:var(--s);border-bottom:1px solid var(--br);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000}
.lb{background:var(--a);color:#000;font-size:26px;font-weight:900;padding:3px 14px;border-radius:8px;letter-spacing:2px}
.tr{display:flex;align-items:center;gap:8px}
.gd{width:9px;height:9px;border-radius:50%;background:var(--m);flex-shrink:0}
.gd.on{background:var(--g);animation:bk 1.2s infinite}.gd.er{background:var(--r)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}

/* Night toggle button */
.night-btn{background:none;border:1px solid var(--br);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:16px;color:var(--m)}
.night-btn.on{background:rgba(245,158,11,.15);border-color:var(--a)}

/* Rotate map toggle */
.rotate-btn{background:none;border:1px solid var(--br);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:15px;color:var(--m)}
.rotate-btn.on{background:rgba(59,130,246,.15);border-color:var(--b);color:var(--b)}

.gbar{padding:8px 14px;font-size:12px;font-weight:600;display:none;align-items:center;gap:8px;flex-shrink:0;z-index:999;position:relative}
.gbar.show{display:flex}
.gbar.sea{background:rgba(59,130,246,.15);color:#93c5fd;border-bottom:1px solid rgba(59,130,246,.2)}
.gbar.fnd{background:rgba(16,185,129,.15);color:#6ee7b7;border-bottom:1px solid rgba(16,185,129,.2)}
.gbar.dn{background:rgba(239,68,68,.15);color:#fca5a5;border-bottom:1px solid rgba(239,68,68,.2)}
.gspin{width:13px;height:13px;min-width:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
.nn2{background:rgba(59,130,246,.12);border-bottom:1px solid rgba(59,130,246,.2);padding:7px 14px;font-size:13px;color:#93c5fd;display:none;flex-shrink:0;z-index:999}
.nn2.show{display:block}

/* MISSED STOP alert */
.missed-alert{background:rgba(239,68,68,.15);border-bottom:2px solid var(--r);padding:10px 14px;font-size:14px;font-weight:700;color:#fca5a5;display:none;flex-shrink:0;z-index:999;text-align:center;animation:flash-r .5s ease 3}
.missed-alert.show{display:block}
@keyframes flash-r{0%,100%{background:rgba(239,68,68,.15)}50%{background:rgba(239,68,68,.4)}}

#map{flex:1;min-height:0;z-index:0}
.bus-icon-wrap{width:40px;height:40px;background:#3b82f6;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .3s}
.stop-dot-wrap{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#000}

.pb{height:5px;background:var(--br);flex-shrink:0;z-index:999;position:relative}
.pbf{height:100%;background:linear-gradient(90deg,var(--b),var(--a));transition:width .5s}

/* Next stop — LARGE for driver visibility */
.nb{background:rgba(10,15,26,.97);border-top:1px solid var(--br);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:999;position:relative}
.nbi{font-size:26px;flex-shrink:0}
.nbn{font-size:calc(17px * var(--fs));font-weight:700;flex:1;line-height:1.2}
.nbp{font-size:12px;color:var(--m);white-space:nowrap}

/* Direction strip — LARGE */
.dstrip{background:rgba(10,15,26,.97);border-top:1px solid var(--br);padding:12px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:999;position:relative}
.darr{width:72px;height:72px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:44px;flex-shrink:0;transition:all .3s}
.dact{font-size:calc(24px * var(--fs));font-weight:900;line-height:1.1}
.ddist{font-size:calc(13px * var(--fs));color:var(--m);font-family:monospace;margin-top:3px}
.detv{font-size:calc(26px * var(--fs));font-weight:900;color:var(--a);font-family:monospace;line-height:1}
.detl{font-size:11px;color:var(--m);font-weight:700}

/* Clock */
.clock{font-size:calc(14px * var(--fs));font-weight:700;color:var(--t);font-family:monospace;letter-spacing:1px}

.sr2{background:rgba(10,15,26,.97);border-top:1px solid var(--br);display:flex;gap:6px;padding:8px 10px;flex-shrink:0;z-index:999;position:relative}
.bn{flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
.bp{background:var(--s2);border:1px solid var(--br);color:var(--t)}.bx{background:var(--a);color:#000}
.bs{padding:12px 10px;border-radius:10px;border:none;background:var(--s2);color:var(--m);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}

.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-15px);background:rgba(15,30,60,.97);border:1px solid var(--br);border-radius:50px;padding:10px 22px;font-size:15px;font-weight:700;color:var(--t);white-space:nowrap;opacity:0;pointer-events:none;z-index:2000;transition:all .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.arrived{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.87);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px}
.arrived.show{display:flex}

/* Night mode big text boost */
body.night .dact{font-size:calc(28px * var(--fs))}
body.night .nbn{font-size:calc(20px * var(--fs))}
body.night .ddist{color:#ccc}

.leaflet-pane{z-index:1!important}
.leaflet-top,.leaflet-bottom{z-index:2!important}
</style>
</head>
<body>

<!-- ═══ SETUP ═══ -->
<div id="setup">
  <div>
    <span class="logo-e">🚌</span>
    <div class="logo-t">BUS NAV</div>
    <div class="logo-s">מערכת ניווט לנהג אוטובוס</div>
  </div>

  <!-- DB STATUS BANNER -->
  <div id="dbBanner" style="width:100%;max-width:440px;background:var(--s);border:1px solid var(--br);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;">
    <div id="dbIcon" style="font-size:22px;flex-shrink:0">⏳</div>
    <div style="flex:1;min-width:0">
      <div id="dbTitle" style="font-weight:700;font-size:13px">טוען מאגר קווים…</div>
      <div id="dbSub" style="font-size:11px;color:var(--m);margin-top:2px"></div>
    </div>
    <button id="dbRefresh" onclick="refreshDB()" style="background:var(--s2);border:1px solid var(--br);color:var(--a);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;white-space:nowrap;display:none">🔄 עדכן</button>
  </div>

  <div class="card">
    <span class="lbl">חברה</span>
    <div class="cops" id="cops">
      <div class="cop on" data-co="דן"       onclick="selCo(this)">דן</div>
      <div class="cop" data-co="אגד"         onclick="selCo(this)">אגד</div>
      <div class="cop" data-co="מטרופולין"   onclick="selCo(this)">מטרופולין</div>
      <div class="cop" data-co="קווים"       onclick="selCo(this)">קווים</div>
      <div class="cop" data-co="נת״ע"        onclick="selCo(this)">נת״ע</div>
      <div class="cop" data-co="אפיקים"      onclick="selCo(this)">אפיקים</div>
    </div>
    <span class="lbl">מספר קו</span>
    <div class="row2">
      <input id="ln" type="number" inputmode="numeric" placeholder="הקלד מספר קו…" onkeydown="if(event.key==='Enter')doFetch()"/>
      <button class="bf" id="bf" onclick="doFetch()">🔍 שלוף</button>
    </div>
    <div class="fst" id="fst"><div class="spin" id="spin" style="display:none"></div><span id="fmsg"></span></div>
    <div id="sec" style="display:none">
      <div class="sbox">
        <div class="shdr"><span>תחנות</span><span id="stag" style="font-size:10px;color:var(--m)"></span></div>
        <div class="ss" id="sl"></div>
      </div>
    </div>
    <div style="margin-top:12px">
      <span class="lbl" style="margin-bottom:6px">✏️ הוספה ידנית</span>
      <div class="adr">
        <input id="an" type="text" placeholder="שם תחנה" onkeydown="if(event.key==='Enter')addM()"/>
        <select id="ad"><option value="s">⬆️ ישר</option><option value="r">↗️ ימינה</option><option value="l">↖️ שמאלה</option><option value="a">🛑 עצור</option></select>
        <button class="badd" onclick="addM()">＋</button>
      </div>
    </div>
  </div>
  <button class="bst" id="bst" onclick="startNav()" disabled>🚀 התחל ניווט</button>
</div>

<!-- ═══ NAV ═══ -->
<div id="nav">
  <!-- Top bar with clock, night mode, rotate -->
  <div class="tb">
    <div class="lb" id="nb">קו —</div>
    <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px;padding:0 6px">
      <div style="font-size:11px;color:var(--m);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%" id="nm"></div>
      <div class="clock" id="clock">--:--</div>
    </div>
    <div class="tr">
      <button class="night-btn" id="nightBtn" onclick="togNight()" title="מצב לילה">🌙</button>
      <button class="rotate-btn" id="rotBtn" onclick="togRotate()" title="סובב מפה לכיוון נסיעה">🧭</button>
      <button id="vbtn" onclick="togV()" style="background:none;border:none;cursor:pointer;font-size:19px;color:var(--g);padding:0">🔊</button>
      <div class="gd" id="gd"></div>
    </div>
  </div>

  <div class="gbar" id="gbar"><div class="gspin" id="gspin"></div><span id="gtxt">מחפש GPS…</span></div>
  <div class="nn2" id="nn2"></div>

  <!-- Missed stop alert -->
  <div class="missed-alert" id="missedAlert">⚠️ דילגת על תחנה! <span id="missedName"></span></div>

  <div id="map"></div>
  <div class="pb"><div class="pbf" id="pbf" style="width:0%"></div></div>

  <!-- Next stop — big -->
  <div class="nb">
    <div class="nbi">🚏</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:10px;color:var(--m);font-weight:700;letter-spacing:1px;text-transform:uppercase">תחנה הבאה</div>
      <div class="nbn" id="nbn">—</div>
    </div>
    <div class="nbp" id="nbp"></div>
  </div>

  <!-- Direction + ETA panel — big -->
  <div class="dstrip">
    <div class="darr" id="darr"><span id="darrT">⬆️</span></div>
    <div style="flex:1">
      <div class="dact" id="dact">המתן…</div>
      <div class="ddist" id="ddist">—</div>
    </div>
    <!-- ETA boxes -->
    <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0;align-items:flex-end">
      <div style="background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:10px;padding:5px 10px;text-align:center;min-width:64px">
        <div class="detv" id="detv" style="color:#93c5fd">—</div>
        <div class="detl" style="color:#93c5fd">לתחנה</div>
      </div>
      <div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:5px 10px;text-align:center;min-width:64px">
        <div class="detv" id="etaFinal" style="color:var(--a)">—</div>
        <div class="detl" style="color:var(--a)">לסוף קו</div>
      </div>
    </div>
  </div>

  <!-- Turn-by-turn navigation -->
  <div id="turnStrip" style="display:none;background:rgba(10,15,26,.97);border-top:1px solid rgba(59,130,246,.3);padding:9px 14px;flex-shrink:0;z-index:999;position:relative">
    <div style="display:flex;align-items:center;gap:10px">
      <div id="turnIcon" style="font-size:32px;flex-shrink:0;min-width:36px;text-align:center">⬆️</div>
      <div style="flex:1;min-width:0">
        <div id="turnInstr" style="font-size:calc(15px * var(--fs));font-weight:700;color:#93c5fd;line-height:1.2">מחשב מסלול…</div>
        <div id="turnRoad" style="font-size:11px;color:var(--m);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
      </div>
      <div style="text-align:center;flex-shrink:0">
        <div id="turnDist" style="font-size:18px;font-weight:700;color:#93c5fd;font-family:monospace">—</div>
        <div style="font-size:10px;color:var(--m)">עד פנייה</div>
      </div>
    </div>
  </div>

  <div class="sr2">
    <button class="bn bp" onclick="sim(-1)">⏮ קודמת</button>
    <button class="bn bx" onclick="sim(1)">הבאה ⏭</button>
    <button class="bs" id="abtn" onclick="togA()">▶ אוטו׳</button>
    <button class="bs" onclick="stopNav()" style="color:var(--r)">⏹ סיום</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="arrived" id="arrived">
  <div style="font-size:64px">🏁</div>
  <div style="font-size:26px;font-weight:900;color:var(--g)">הגעת לתחנה הסופית!</div>
  <div style="font-size:14px;color:var(--m)" id="arrsub">סיום קו</div>
  <button style="background:var(--a);color:#000;border:none;padding:13px 30px;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;margin-top:8px;font-family:inherit" onclick="stopNav()">חזור</button>
</div>

<script>
// ══════════════════════════════════════════════════
//  ROUTES DATABASE — loaded from routes.json
//  Cached in localStorage, refreshed on demand
// ══════════════════════════════════════════════════
const DB_KEY     = 'busnav_routes';
const DB_DATE_KEY= 'busnav_routes_date';
const DB_URL     = 'routes.json';  // same GitHub Pages folder
const DB_MAX_AGE = 7;              // days before auto-refresh

let routesDB = null; // { "דן": { "79": {name, stops}, ... }, ... }

function setDBBanner(icon, title, sub, showRefresh=false){
  document.getElementById('dbIcon').textContent  = icon;
  document.getElementById('dbTitle').textContent = title;
  document.getElementById('dbSub').textContent   = sub;
  document.getElementById('dbRefresh').style.display = showRefresh ? 'block' : 'none';
}

async function loadDB(forceRefresh=false){
  // 1. Try localStorage first
  if(!forceRefresh){
    try{
      const cached = localStorage.getItem(DB_KEY);
      const cachedDate = localStorage.getItem(DB_DATE_KEY);
      if(cached && cachedDate){
        const age = (Date.now() - new Date(cachedDate).getTime()) / 86400000;
        if(age < DB_MAX_AGE){
          routesDB = JSON.parse(cached);
          const total = Object.values(routesDB).reduce((s,v)=>s+Object.keys(v).length,0);
          setDBBanner('✅', `מאגר קווים טעון — ${total.toLocaleString()} קווים`,
            `עודכן: ${cachedDate} | לחץ 🔄 לרענון`, true);
          return;
        }
      }
    }catch(e){}
  }

  // 2. Fetch from routes.json
  setDBBanner('⏳', 'מוריד מאגר קווים…', 'אנא המתן, זה עשוי לקחת כמה שניות');
  try{
    const res = await fetch(DB_URL + '?v=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    routesDB = data.routes;
    const today = new Date().toISOString().slice(0,10);
    localStorage.setItem(DB_KEY, JSON.stringify(routesDB));
    localStorage.setItem(DB_DATE_KEY, today);
    const total = Object.values(routesDB).reduce((s,v)=>s+Object.keys(v).length,0);
    setDBBanner('✅', `מאגר עודכן! — ${total.toLocaleString()} קווים`, `נכון ל-${data.updated||today}`, true);
  }catch(e){
    // 3. Fallback — try localStorage even if old
    try{
      const cached = localStorage.getItem(DB_KEY);
      if(cached){
        routesDB = JSON.parse(cached);
        const total = Object.values(routesDB).reduce((s,v)=>s+Object.keys(v).length,0);
        setDBBanner('⚠️', `מאגר ישן (${DB_MAX_AGE}+ ימים) — ${total.toLocaleString()} קווים`,
          'לא הצלחנו לרענן. בדוק אינטרנט ולחץ 🔄', true);
        return;
      }
    }catch{}
    setDBBanner('❌', 'לא ניתן לטעון מאגר', e.message + ' — ניתן לחפש ידנית מ-OSM', true);

    }
  }
}

function bear(a,b,c,d){const f1=a*Math.PI/180,f2=c*Math.PI/180,dl=(d-b)*Math.PI/180;return(Math.atan2(Math.sin(dl)*Math.cos(f2),Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl))*180/Math.PI+360)%360;}
function bdir(d){d=((d+540)%360)-180;return d>30?'r':d<-30?'l':'s';}
function hav(a,b,c,d){const R=6371000,da=(c-a)*Math.PI/180,db=(d-b)*Math.PI/180;const e=Math.sin(da/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(db/2)**2;return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));}
function buildStops(raw){return raw.map((s,i)=>{let d='s';if(i===raw.length-1)d='a';else if(i>0){const b1=bear(raw[i-1].la,raw[i-1].lo,s.la,s.lo),b2=bear(s.la,s.lo,raw[i+1].la,raw[i+1].lo);d=bdir(b2-b1);}return{n:s.n,la:s.la,lo:s.lo,d};});}

};

  'turn slight right':'פנה מעט ימינה','turn slight left':'פנה מעט שמאלה',

async function fetchOSRMRoute(fromLat,fromLon,toLat,toLon){
  const now=Date.now();
  if(now-lastRouteFetch<15000)return; // throttle — max once per 15sec
  lastRouteFetch=now;
  try{
    const url=`${OSRM_BASE}${fromLon},${fromLat};${toLon},${toLat}?steps=true&annotations=false&geometries=geojson&overview=full&language=he`;
    const res=await fetch(url);
    if(!res.ok)return;
    const data=await res.json();
    if(data.code!=='Ok'||!data.routes?.length)return;
    const route=data.routes[0];
    // Extract steps
    const steps=[];
    for(const leg of route.legs){
      for(const step of leg.steps){
        const mod=step.maneuver?.modifier||'';
        const type=step.maneuver?.type||'';
        const key=(type+' '+mod).trim().toLowerCase();
        steps.push({
          icon:TURN_ICONS[key]||TURN_ICONS[type]||'⬆️',
          text:TURN_HE[key]||TURN_HE[type]||'המשך',
          road:step.name||'',
          dist:step.distance,
        });
      }
    }
    turnSteps=steps;
    turnIdx=0;
    updateTurnDisplay();
    // Draw route on map
    if(map&&route.geometry){
      if(routePolyline)map.removeLayer(routePolyline);
      const coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);
      routePolyline=L.polyline(coords,{color:'#3b82f6',weight:5,opacity:.85}).addTo(map);
    }
    document.getElementById('turnStrip').style.display='block';
  }catch(e){console.log('OSRM error:',e);}
}

function updateTurnDisplay(){
  if(!turnSteps.length)return;
  // Find current step based on distance
  const step=turnSteps[Math.min(turnIdx,turnSteps.length-1)];
  document.getElementById('turnIcon').textContent=step.icon;
  document.getElementById('turnInstr').textContent=step.text;
  document.getElementById('turnRoad').textContent=step.road?'ב'+step.road:'';
  const d=step.dist;
  document.getElementById('turnDist').textContent=d<1000?Math.round(d)+'מ':(d/1000).toFixed(1)+'ק"מ';
}

function updateTurnByPosition(lat,lon){
  if(!turnSteps.length)return;
  // Find closest step by accumulated distance
  // Simple approach: advance step when within 30m of its end
  if(turnIdx<turnSteps.length-1){
    const step=turnSteps[turnIdx];
    if(step.dist<30){turnIdx++;updateTurnDisplay();}
    else{
      // Decrease remaining distance estimate
      turnSteps[turnIdx].dist=Math.max(0,step.dist-2);
      updateTurnDisplay();
    }
  }
}
//  - dist to next stop (from GPS or between stops)
//  - sum of inter-stop distances for remaining stops
//  - +30 sec per stop for boarding/alighting
//  - speed: current GPS speed, fallback 25 km/h
// ══════════════════════════════════════════════════
const STOP_DWELL=0.5;   // minutes per stop (30 sec boarding/alighting)
const DEFAULT_KMH=25;   // fallback speed when GPS speed not available

function calcETA(currentLat,currentLon,currentKmh,fromStopIdx){
  // Speed in m/min
  const kmh=currentKmh>3?currentKmh:DEFAULT_KMH;
  const mpm=kmh*1000/60;

  let totalMin=0;

  // Segment 1: current pos → next stop
  const nextStop=stops[fromStopIdx];
  if(nextStop?.la&&currentLat!=null){
    const d=hav(currentLat,currentLon,nextStop.la,nextStop.lo);
    totalMin+=d/mpm;
  }

  // Segment 2+: between remaining stops + dwell per stop
  for(let i=fromStopIdx;i<stops.length-1;i++){
    const a=stops[i],b=stops[i+1];
    if(a?.la&&b?.la){
      totalMin+=hav(a.la,a.lo,b.la,b.lo)/mpm;
    }
    totalMin+=STOP_DWELL; // dwell at each intermediate stop
  }

  return Math.max(1,Math.round(totalMin));
}

function updateETA(lat,lon,kmh){
  // ETA to NEXT stop only
  if(ci>=stops.length){document.getElementById('detv').textContent='—';document.getElementById('etaFinal').textContent='—';return;}
  const s=stops[ci];
  let etaNext='—';
  if(s?.la&&lat!=null){
    const d=hav(lat,lon,s.la,s.lo);
    const mpm=(kmh>3?kmh:DEFAULT_KMH)*1000/60;
    etaNext=Math.max(1,Math.round(d/mpm));
  }
  document.getElementById('detv').textContent=etaNext;

  // ETA to FINAL stop
  if(ci>=stops.length-1){document.getElementById('etaFinal').textContent='🏁';return;}
  const etaEnd=calcETA(lat,lon,kmh,ci);
  document.getElementById('etaFinal').textContent=etaEnd;
}

function setFst(type,msg){const el=document.getElementById('fst');el.className='fst '+type;document.getElementById('spin').style.display=type==='ld'?'block':'none';document.getElementById('fmsg').textContent=msg;}

async function doFetch(){
  const ln=document.getElementById('ln').value.trim();
  if(!ln){setFst('er','הזן מספר קו');return;}
  document.getElementById('bf').disabled=true;stops=[];renderSetup([]);

  function applyRoute(raw,name,src){
    stops=buildStops(raw);lineName=ln;routeName=name;
    setFst('ok','✓ קו '+ln+' — '+stops.length+' תחנות ('+src+')');
    document.getElementById('stag').textContent=src==='GTFS'?'📋 GTFS':src==='מאגר'?'📍 מאגר':'🗺 OSM';
    document.getElementById('nb').textContent='קו '+ln;
    document.getElementById('nm').textContent=routeName;
    renderSetup(stops);
    document.getElementById('bf').disabled=false;
    document.getElementById('bst').disabled=false;
  }

  // 1. מאגר פנימי — עדיפות ראשונה (נתונים מדויקים ידניים)
  const internal=INTERNAL_DB[co]?.[ln];
  if(internal){
    applyRoute(internal.s.map(s=>({n:s.n,la:s.la,lo:s.lo})),co+' — '+internal.n,'מאגר');
    return;
  }

  // 2. routesDB (OSM) — מהיר, מכיל את רוב הקווים
  if(routesDB){
    // חפש בחברה שנבחרה
    if(routesDB[co]?.[ln]){
      const r=routesDB[co][ln];
      applyRoute(r.stops.map(s=>({n:s.n,la:s.la,lo:s.lo})),co+' — '+(r.name||'קו '+ln),'GTFS');
      return;
    }
    // חפש בכל החברות
    for(const [coName,coRoutes] of Object.entries(routesDB)){
      if(coRoutes[ln]){
        const r=coRoutes[ln];
        applyRoute(r.stops.map(s=>({n:s.n,la:s.la,lo:s.lo})),coName+' — '+(r.name||'קו '+ln),'GTFS');
        return;
      }
    }
  }

  // 3. OSM (גיבוי אחרון)
  setFst('ld','מחפש קו '+ln+' ב-OpenStreetMap…');
  try{
    const q=`[out:json][timeout:30];(relation["type"="route"]["route"="bus"]["ref"="${ln}"](29.4,34.2,33.4,35.9););out body;>;out skel qt;`;
    const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(q)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const raw=parseBestOverpass(data);
    if(raw&&raw.length>=2){
      setFst('ld','נמצאו '+raw.length+' תחנות, מוסיף כתובות…');
      await geocodeUnnamed(raw);
      applyRoute(raw,co+' — קו '+ln,'OSM');
    }else{
      setFst('er','קו '+ln+' לא נמצא. לחץ 🔄 לרענן מאגר או הוסף ידנית.');
    }
  }catch(e){setFst('er','שגיאה: '+e.message);}
  document.getElementById('bf').disabled=false;
  document.getElementById('bst').disabled=stops.length<2;
}

function parseBestOverpass(data){
  const nm={};
  data.elements.forEach(el=>{if(el.type==='node')nm[el.id]=el;});
  const relations=data.elements.filter(el=>el.type==='relation');
  if(!relations.length)return null;

  // Map of Hebrew company name → keywords to search in operator tag
  const opKeywords={
    'דן':['dan','דן'],
    'אגד':['egged','אגד'],
    'מטרופולין':['metropoline','מטרופולין'],
    'קווים':['kavim','קווים'],
    'נת״ע':['nta','נת"ע','nteev'],
    'אפיקים':['afikim','אפיקים'],
  };
  const keywords=(opKeywords[co]||[]).map(k=>k.toLowerCase());

  // Score each relation: operator match = bonus, more stops = better
  let best=null,bestScore=-1;
  for(const rel of relations){
    const raw=extractStops(rel,nm);
    if(!raw||raw.length<2)continue;
    let score=raw.length; // base score = number of stops
    // Bonus if operator tag matches selected company
    const op=(rel.tags?.operator||rel.tags?.['operator:en']||rel.tags?.network||'').toLowerCase();
    if(keywords.some(k=>op.includes(k)))score+=1000;
    if(score>bestScore){best=raw;bestScore=score;}
  }
  return best;
}

function extractStops(rel,nm){
  const raw=[];
  (rel.members||[]).forEach(m=>{
    if(m.type!=='node')return;
    if(!['stop','stop_entry_only','stop_exit_only','platform',''].includes(m.role))return;
    const node=nm[m.ref];if(!node)return;
    const name=node.tags?.['name:he']||node.tags?.name||null;
    if(raw.length&&raw[raw.length-1].n===name&&name!==null)return;
    raw.push({n:name,la:node.lat,lo:node.lon});
  });
  return raw.length>=2?raw:null;
}

// Reverse geocode stops that have no name using Nominatim
async function geocodeUnnamed(raw){
  const unnamed=raw.filter(s=>!s.n);
  if(!unnamed.length)return;
  // Batch: do up to 5 at a time with small delay to respect Nominatim limits
  for(let i=0;i<unnamed.length;i++){
    const s=unnamed[i];
    try{
      const r=await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${s.la}&lon=${s.lo}&format=json&accept-language=he`,
        {headers:{'Accept':'application/json'}}
      );
      if(r.ok){
        const d=await r.json();
        // Build a short readable name from address parts
        const a=d.address||{};
        const parts=[
          a.road||a.pedestrian||a.footway||a.street,
          a.house_number,
          a.suburb||a.neighbourhood||a.quarter
        ].filter(Boolean);
        s.n=parts.length?parts.join(' / '):d.display_name?.split(',')[0]||`תחנה (${s.la.toFixed(3)},${s.lo.toFixed(3)})`;
      }
    }catch{}
    // Small delay between requests
    if(i<unnamed.length-1)await new Promise(r=>setTimeout(r,300));
  }
  // Fill any still-unnamed
  raw.forEach((s,i)=>{if(!s.n)s.n='תחנה '+(i+1);});
}

  const size=isDone?12:isCur?20:15;
  const bg=isDone?'#10b981':isCur?'#ef4444':'#f59e0b';
  const shadow=isCur?'0 0 14px rgba(239,68,68,.9)':'0 1px 5px rgba(0,0,0,.5)';
  return L.divIcon({className:'',html:`<div class="stop-dot-wrap" style="width:${size}px;height:${size}px;background:${bg};box-shadow:${shadow};font-size:${isCur?10:8}px">${idx+1}</div>`,iconAnchor:[size/2,size/2]});
}

function initMap(){
  if(map){map.remove();map=null;busMarker=null;stopMarkers=[];routeLine=null;navLine=null;}
  const center=stops.find(s=>s.la)||{la:32.07,lo:34.78};
  map=L.map('map',{zoomControl:true,attributionControl:true}).setView([center.la,center.lo],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  const ll=stops.filter(s=>s.la).map(s=>[s.la,s.lo]);
  if(ll.length>1){routeLine=L.polyline(ll,{color:'#f59e0b',weight:5,opacity:.8,dashArray:'10 6'}).addTo(map);map.fitBounds(routeLine.getBounds(),{padding:[40,40]});}
  stops.forEach((s,i)=>{
    if(!s.la)return;
    const m=L.marker([s.la,s.lo],{icon:makeStopIcon(i,false,i===0),zIndexOffset:i===0?100:0}).addTo(map);
    m.bindTooltip((i+1)+'. '+s.n,{direction:'top',offset:[0,-8]});
    stopMarkers.push(m);
  });
  const busIc=L.divIcon({className:'',html:'<div class="bus-icon-wrap">🚌</div>',iconAnchor:[20,20]});
  const sp=stops.find(s=>s.la);
  if(sp)busMarker=L.marker([sp.la,sp.lo],{icon:busIc,zIndexOffset:1000}).addTo(map);
  setTimeout(()=>map.invalidateSize(),200);
}

function updateMapPos(lat,lon){
  if(!map)return;
  if(busMarker)busMarker.setLatLng([lat,lon]);
  map.panTo([lat,lon],{animate:true,duration:0.8});
  if(ci<stops.length&&stops[ci]?.la){
    if(navLine)map.removeLayer(navLine);
    navLine=L.polyline([[lat,lon],[stops[ci].la,stops[ci].lo]],{color:'#3b82f6',weight:4,opacity:.9,dashArray:'6 4'}).addTo(map);
  }
  stopMarkers.forEach((m,i)=>m.setIcon(makeStopIcon(i,i<ci,i===ci)));
  applyMapRotation();
}
function refreshStopColors(){stopMarkers.forEach((m,i)=>m.setIcon(makeStopIcon(i,i<ci,i===ci)));}

// ══════════════════════════════════════════════════
//  START / STOP
// ══════════════════════════════════════════════════
function startNav(){
  if(stops.length<2)return;
  ci=0;spkApp=false;spkJun=false;spkArr=false;nearDone=false;prevDistToStop=null;
  myLat=null;myLon=null;myHeading=null;
  document.getElementById('setup').style.display='none';
  document.getElementById('nav').style.display='flex';
  document.getElementById('arrsub').textContent='סיום קו '+lineName;
  document.getElementById('arrived').classList.remove('show');
  document.getElementById('missedAlert').classList.remove('show');
  initMap();updateUI();startGPS();
  updateClock();
  clockInt=setInterval(updateClock,10000);
  // Show start choice immediately
  setTimeout(()=>{
    if(!nearDone){
      nearDone=true;
      showStartDialog(0,0,null,null);
    }
  },2000);
  setTimeout(()=>spk('קו '+lineName+' מתחיל',true),700);
}
function stopNav(){
  if(watchId)navigator.geolocation.clearWatch(watchId);
  if(autoInt)clearInterval(autoInt);
  if(clockInt)clearInterval(clockInt);
  if(window.speechSynthesis)speechSynthesis.cancel();
  autoRun=false;gpsOn=false;nearDone=false;
  document.getElementById('abtn').textContent='▶ אוטו׳';
  document.getElementById('arrived').classList.remove('show');
  document.getElementById('nn2').classList.remove('show');
  document.getElementById('missedAlert').classList.remove('show');
  if(map){map.remove();map=null;busMarker=null;stopMarkers=[];routeLine=null;navLine=null;}
  document.getElementById('nav').style.display='none';
  document.getElementById('setup').style.display='flex';
}

// ══════════════════════════════════════════════════
//  GPS
// ══════════════════════════════════════════════════
function startGPS(){
  const bar=document.getElementById('gbar'),txt=document.getElementById('gtxt'),sp=document.getElementById('gspin');
  if(!navigator.geolocation){bar.className='gbar dn show';sp.style.display='none';txt.textContent='GPS לא זמין';document.getElementById('gd').classList.add('er');return;}
  bar.className='gbar sea show';sp.style.display='block';txt.textContent='מחפש GPS…';
  watchId=navigator.geolocation.watchPosition(pos=>{
    const{latitude:lat,longitude:lon,accuracy,speed,heading}=pos.coords;
    gpsOn=true;
    document.getElementById('gd').classList.remove('er');document.getElementById('gd').classList.add('on');
    if(heading!=null&&heading>=0)myHeading=heading;
    else if(myLat!=null&&hav(myLat,myLon,lat,lon)>5)myHeading=bear(myLat,myLon,lat,lon);
    myLat=lat;myLon=lon;
    if(accuracy<120){bar.className='gbar fnd show';sp.style.display='none';txt.textContent='✅ GPS — דיוק '+Math.round(accuracy)+' מ׳';setTimeout(()=>bar.classList.remove('show'),4000);}
    else{bar.className='gbar sea show';sp.style.display='block';txt.textContent='מחכה לדיוק… ('+Math.round(accuracy)+' מ׳)';}
    if(!nearDone&&accuracy<500){nearDone=true;jumpNearest(lat,lon);}
    // If accuracy still bad after 20sec, show dialog anyway
    if(!nearDone){setTimeout(()=>{if(!nearDone){nearDone=true;jumpNearest(lat,lon);}},20000);}
    checkProx(lat,lon,speed);
    updateMapPos(lat,lon);
    updateTurnByPosition(lat,lon);
    // Fetch new route when stop changes or every 30sec
    if(ci<stops.length&&stops[ci]?.la){
      fetchOSRMRoute(lat,lon,stops[ci].la,stops[ci].lo);
    }
    // Real-time direction
    if(ci<stops.length&&stops[ci]?.la&&myHeading!=null){
      const dist=hav(lat,lon,stops[ci].la,stops[ci].lo);
      if(dist>R_JUN){
        const diff=((bear(lat,lon,stops[ci].la,stops[ci].lo)-myHeading+540)%360)-180;
        let ar,tx,cl;
        if(diff>25){ar='↗️';tx='פנה ימינה';cl='245,158,11';}
        else if(diff<-25){ar='↖️';tx='פנה שמאלה';cl='245,158,11';}
        else{ar='⬆️';tx='ישר קדימה';cl='59,130,246';}
        document.getElementById('darrT').textContent=ar;
        document.getElementById('dact').textContent=tx;
        document.getElementById('darr').style.background=`rgba(${cl},0.15)`;
      }
    }
  },err=>{
    gpsOn=false;document.getElementById('gd').classList.remove('on');document.getElementById('gd').classList.add('er');
    sp.style.display='none';bar.className='gbar dn show';
    const msgs={1:'❌ גישה נדחתה — הגדרות ← Safari ← מיקום ← תמיד',2:'📡 מיקום לא זמין',3:'⏱ פסק זמן GPS'};
    txt.style.whiteSpace='pre-line';txt.textContent=msgs[err.code]||'GPS שגיאה '+err.code;
    document.getElementById('gd').classList.add('er');
  },{enableHighAccuracy:true,maximumAge:0,timeout:30000});
}

function jumpNearest(lat,lon){
  const sorted=stops.map((s,i)=>({i,d:s.la?hav(lat,lon,s.la,s.lo):Infinity})).sort((a,b)=>a.d-b.d);
  const best=sorted[0];
  if(!best||best.d>10000)return;

  // If already at first stop — no need to ask
  if(best.i===0){return;}

  // Ask user: start from beginning or nearest stop
  showStartDialog(best.i,best.d,lat,lon);
}

function showStartDialog(nearIdx,nearDist,lat,lon){
  const nearName=stops[nearIdx].n;
  const isPreGPS=(lat===null);
  const dlg=document.createElement('div');
  dlg.style.cssText='position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px';
  dlg.innerHTML=`
    <div style="background:#111827;border:1px solid #1e2d45;border-radius:18px;padding:22px;max-width:340px;width:100%;text-align:center">
      <div style="font-size:30px;margin-bottom:10px">🚌</div>
      <div style="font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px">מאיפה להתחיל?</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:18px">
        ${isPreGPS ? 'בחר תחנת התחלה:' : `זוהה מיקומך ${Math.round(nearDist)} מ' מ<br><b style="color:#93c5fd">${nearName}</b>`}
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${!isPreGPS && nearIdx>0 ? `
        <button onclick="chooseStart(${nearIdx},this.closest('[style*=fixed]'))"
          style="background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);color:#93c5fd;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
          📍 תחנה קרובה (${nearIdx+1})<br>
          <span style="font-size:11px;font-weight:400">${nearName}</span>
        </button>` : ''}
        <button onclick="chooseStart(0,this.closest('[style*=fixed]'))"
          style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fcd34d;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
          🚏 תחנה ראשונה (1)<br>
          <span style="font-size:11px;font-weight:400">${stops[0].n}</span>
        </button>
        <button onclick="chooseStart(-1,this.closest('[style*=fixed]'))"
          style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
          📡 זהה מיקום אוטומטית
        </button>
      </div>
    </div>`;
  document.body.appendChild(dlg);
}

function chooseStart(idx,dlg){
  if(dlg)dlg.remove();
  if(idx===-1){
    // Wait for GPS to detect nearest stop
    nearDone=false;
    toast('📡 ממתין לזיהוי GPS…');
    return;
  }
  if(idx===ci&&ci===0)return;
  ci=idx;updateUI();refreshStopColors();
  if(stops[ci]?.la){
    if(busMarker)busMarker.setLatLng([stops[ci].la,stops[ci].lo]);
    if(map)map.setView([stops[ci].la,stops[ci].lo],16,{animate:true});
  }
  const nn=document.getElementById('nn2');
  nn.textContent='🚏 מתחיל מתחנה '+(ci+1)+': '+stops[ci].n;
  nn.classList.add('show');setTimeout(()=>nn.classList.remove('show'),5000);
  spk('מתחיל מתחנה '+stops[ci].n,true);
}

// ══════════════════════════════════════════════════
//  PROXIMITY + MISSED STOP DETECTION
// ══════════════════════════════════════════════════
function checkProx(lat,lon,speed){
  if(ci>=stops.length)return;
  const s=stops[ci];if(!s.la){document.getElementById('ddist').textContent='אין קואורדינטות';return;}
  const dist=hav(lat,lon,s.la,s.lo);
  const kmh=speed?Math.round(speed*3.6):0;
  document.getElementById('ddist').textContent='מרחק: '+(dist<1000?Math.round(dist)+' מ׳':(dist/1000).toFixed(1)+' ק״מ')+(kmh>3?' | '+kmh+' קמ״ש':'');
  updateETA(lat,lon,kmh);

  // ── MISSED STOP DETECTION ──
  // If we were getting closer then now moving away AND we're past the stop distance
  if(prevDistToStop!==null && prevDistToStop<MISSED_DIST && dist>prevDistToStop+50 && dist<MISSED_DIST*3 && !spkArr){
    // We passed the stop without triggering arrival
    const missedEl=document.getElementById('missedAlert');
    document.getElementById('missedName').textContent=s.n;
    missedEl.classList.add('show');
    setTimeout(()=>missedEl.classList.remove('show'),8000);
    spk('שים לב! דילגת על תחנה '+s.n,true);
  }
  prevDistToStop=dist;

  // ── 3 PHASES ──
  if(dist<300&&!spkApp){spkApp=true;toast('🚏 מתקרבים: '+s.n);spk('מתקרבים לתחנה '+s.n);}
  if(dist<150&&!spkJun){spkJun=true;spk('בצומת — '+(DIR[s.d]?.sa||'ישר קדימה'),true);}
  if(dist<80&&!spkArr){
    spkArr=true;prevDistToStop=null;
    toast('🛑 עצור: '+s.n);spk('עצור בתחנה '+s.n,true);
    // Clear turn nav for next segment
    turnSteps=[];turnIdx=0;
    document.getElementById('turnStrip').style.display='none';
    if(routePolyline){map?.removeLayer(routePolyline);routePolyline=null;}
    setTimeout(()=>{
      if(ci<stops.length-1){ci++;spkApp=false;spkJun=false;spkArr=false;prevDistToStop=null;updateUI();refreshStopColors();setTimeout(()=>spk('תחנה הבאה: '+stops[ci]?.n,true),2000);}
      else setTimeout(()=>{document.getElementById('arrived').classList.add('show');spk('הגעת לתחנה הסופית. נסיעה טובה!',true);},600);
    },1500);
  }
}

// ══════════════════════════════════════════════════
//  UI UPDATE
// ══════════════════════════════════════════════════
function updateUI(){
  if(ci>=stops.length)return;
  const s=stops[ci],d=DIR[s.d]||DIR.s;
  document.getElementById('darrT').textContent=d.ar;
  document.getElementById('darr').style.background=`rgba(${d.cl},0.15)`;
  document.getElementById('dact').textContent=d.tx;
  document.getElementById('nbn').textContent=s.n;
  document.getElementById('nbp').textContent=(ci+1)+' / '+stops.length;
  if(!gpsOn){
    document.getElementById('ddist').textContent='לחץ הבאה להדמיה';
    updateETA(myLat,myLon,0); // sim: uses default speed
  }
  document.getElementById('pbf').style.width=(ci/Math.max(1,stops.length-1)*100)+'%';
  if(map&&s.la&&!myLat)map.setView([s.la,s.lo],16,{animate:true});
}

// ══════════════════════════════════════════════════
//  SIMULATION
// ══════════════════════════════════════════════════
function sim(dir){
  ci=Math.max(0,Math.min(stops.length-1,ci+dir));
  spkApp=false;spkJun=false;spkArr=false;prevDistToStop=null;
  const s=stops[ci];
  if(!gpsOn&&s.la){myLat=s.la;myLon=s.lo;if(busMarker)busMarker.setLatLng([s.la,s.lo]);if(map)map.setView([s.la,s.lo],16,{animate:true});refreshStopColors();}
  if(dir>0){toast('🚏 '+s.n);spk('מתקרבים לתחנה '+s.n);setTimeout(()=>spk('בצומת — '+(DIR[s.d]?.sa||'ישר קדימה'),true),2000);setTimeout(()=>spk('עצור בתחנה '+s.n,true),4000);if(ci>=stops.length-1)setTimeout(()=>{document.getElementById('arrived').classList.add('show');spk('הגעת לתחנה הסופית. נסיעה טובה!',true);},800);}
  else{toast('⬅️ חזרה: '+s.n);spk('חוזרים לתחנה '+s.n);}
  updateUI();
}
function togA(){
  if(autoRun){clearInterval(autoInt);autoRun=false;document.getElementById('abtn').textContent='▶ אוטו׳';return;}
  autoRun=true;document.getElementById('abtn').textContent='⏸ עצור';
  autoInt=setInterval(()=>{
    if(ci>=stops.length-1){clearInterval(autoInt);autoRun=false;document.getElementById('abtn').textContent='▶ אוטו׳';setTimeout(()=>{document.getElementById('arrived').classList.add('show');spk('הגעת לתחנה הסופית. נסיעה טובה!',true);},500);return;}
    ci++;spkApp=false;spkJun=false;spkArr=false;prevDistToStop=null;
    const s=stops[ci];if(!gpsOn&&s.la){myLat=s.la;myLon=s.lo;if(busMarker)busMarker.setLatLng([s.la,s.lo]);if(map)map.setView([s.la,s.lo],16,{animate:true});refreshStopColors();}
    updateUI();toast('🚏 '+s.n);spk('מתקרבים לתחנה '+s.n);
    setTimeout(()=>spk('בצומת — '+(DIR[s.d]?.sa||'ישר קדימה'),true),1500);
    setTimeout(()=>spk('עצור בתחנה '+s.n,true),3000);
  },5000);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
