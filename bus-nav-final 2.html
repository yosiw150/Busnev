<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>נווט נהג אוטובוס</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1a;--s:#111827;--s2:#1a2235;--a:#f59e0b;--g:#10b981;--r:#ef4444;--b:#3b82f6;--t:#f1f5f9;--m:#64748b;--br:#1e2d45}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;height:100dvh}
/* SETUP */
#setup{display:flex;flex-direction:column;align-items:center;height:100dvh;overflow-y:auto;padding:16px;gap:12px;background:radial-gradient(ellipse at 50% 0,#1a2c4a,var(--bg) 55%)}
.logo-e{font-size:52px;text-align:center;display:block}
.logo-t{font-size:30px;font-weight:900;color:var(--a);letter-spacing:3px;text-align:center}
.logo-s{font-size:12px;color:var(--m);text-align:center}
.card{background:var(--s);border:1px solid var(--br);border-radius:16px;padding:16px;width:100%;max-width:440px}
.lbl{font-size:10px;font-weight:700;color:var(--m);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:8px}
.cops{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cop{padding:5px 12px;border-radius:20px;border:1px solid var(--br);background:var(--s2);color:var(--m);font-size:12px;cursor:pointer}
.cop.on{border-color:var(--a);color:var(--a);background:rgba(245,158,11,.1)}
.row2{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:6px}
input[type=number]{background:var(--s2);border:1px solid var(--br);color:var(--t);padding:13px 14px;border-radius:10px;font-size:20px;width:100%;outline:none}
input[type=number]:focus{border-color:var(--a)}
.bf{background:var(--a);color:#000;border:none;padding:13px 16px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.msg{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:5px;display:none}
.msg.ok{display:block;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.msg.er{display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.sbox{background:var(--s2);border:1px solid var(--br);border-radius:10px;overflow:hidden;margin-top:10px}
.shdr{padding:7px 12px;border-bottom:1px solid var(--br);font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;display:flex;justify-content:space-between}
.ss{max-height:180px;overflow-y:auto}
.sr{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid rgba(30,45,69,.5);font-size:12px}
.sr:last-child{border-bottom:none}
.sn{background:var(--a);color:#000;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.sc{flex:1;min-width:0}.snm{font-weight:600;font-size:13px}.sco{font-size:10px;color:var(--m);font-family:monospace}
.sdg{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;flex-shrink:0}
.ds2{background:rgba(59,130,246,.15);color:#93c5fd}.dr2,.dl2{background:rgba(245,158,11,.15);color:#fcd34d}.da2{background:rgba(16,185,129,.15);color:#6ee7b7}
.adr{display:grid;grid-template-columns:1fr auto auto;gap:6px;margin-top:10px}
.adr input{padding:8px 10px;font-size:13px;background:var(--s2);border:1px solid var(--br);color:var(--t);border-radius:8px;outline:none}
select{background:var(--s2);border:1px solid var(--br);color:var(--t);padding:8px 10px;border-radius:8px;font-size:12px;outline:none}
.badd{background:var(--s2);border:1px solid var(--br);color:var(--a);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:18px}
.bst{width:100%;max-width:440px;background:var(--a);color:#000;border:none;padding:15px;border-radius:14px;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,.3)}
.bst:disabled{opacity:.4;cursor:not-allowed}
/* NAV */
#nav{display:none;flex-direction:column;height:100dvh}
.tb{background:var(--s);border-bottom:1px solid var(--br);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.lb{background:var(--a);color:#000;font-size:22px;font-weight:900;padding:3px 12px;border-radius:8px;letter-spacing:2px}
.tr{display:flex;align-items:center;gap:8px}
.gd{width:9px;height:9px;border-radius:50%;background:var(--m);flex-shrink:0}
.gd.on{background:var(--g);animation:bk 1.2s infinite}.gd.er{background:var(--r)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
/* GPS status bar */
.gbar{padding:8px 14px;font-size:12px;font-weight:600;display:none;align-items:center;gap:8px;flex-shrink:0}
.gbar.show{display:flex}
.gbar.sea{background:rgba(59,130,246,.15);color:#93c5fd;border-bottom:1px solid rgba(59,130,246,.2)}
.gbar.fnd{background:rgba(16,185,129,.15);color:#6ee7b7;border-bottom:1px solid rgba(16,185,129,.2)}
.gbar.dn{background:rgba(239,68,68,.15);color:#fca5a5;border-bottom:1px solid rgba(239,68,68,.2)}
.gspin{width:13px;height:13px;min-width:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* nearest notice */
.nn2{background:rgba(59,130,246,.12);border-bottom:1px solid rgba(59,130,246,.25);padding:7px 14px;font-size:12px;color:#93c5fd;display:none;flex-shrink:0}
.nn2.show{display:block}
/* CANVAS MAP */
#mapWrap{flex:1;min-height:0;position:relative;background:#0d1b2a;overflow:hidden}
#mapCanvas{display:block;width:100%;height:100%}
.map-legend{position:absolute;bottom:8px;right:8px;background:rgba(10,15,26,.8);border:1px solid var(--br);border-radius:8px;padding:6px 10px;font-size:10px;color:var(--m);display:flex;flex-direction:column;gap:3px}
.leg-row{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* progress */
.pb{height:4px;background:var(--br);flex-shrink:0}
.pbf{height:100%;background:linear-gradient(90deg,var(--b),var(--a));transition:width .5s}
/* next stop bar */
.nb{background:rgba(10,15,26,.97);border-top:1px solid var(--br);padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nbi{font-size:22px;flex-shrink:0}.nbn{font-size:15px;font-weight:700;flex:1}.nbp{font-size:11px;color:var(--m)}
/* direction strip */
.dstrip{background:rgba(10,15,26,.97);border-top:1px solid var(--br);padding:11px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.darr{width:68px;height:68px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;transition:background .3s}
.dact{font-size:22px;font-weight:900;line-height:1.1}
.ddist{font-size:12px;color:var(--m);font-family:monospace;margin-top:3px}
.detv{font-size:22px;font-weight:900;color:var(--a);font-family:monospace;line-height:1}
.detl{font-size:10px;color:var(--m);font-weight:700}
/* sim row */
.sr2{background:rgba(10,15,26,.97);border-top:1px solid var(--br);display:flex;gap:6px;padding:8px 10px;flex-shrink:0}
.bn{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.bp{background:var(--s2);border:1px solid var(--br);color:var(--t)}.bx{background:var(--a);color:#000}
.bs{padding:11px 10px;border-radius:10px;border:none;background:var(--s2);color:var(--m);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
/* toast */
.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-15px);background:rgba(15,30,60,.97);border:1px solid var(--br);border-radius:50px;padding:9px 20px;font-size:13px;font-weight:700;color:var(--t);white-space:nowrap;opacity:0;pointer-events:none;z-index:200;transition:all .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* arrived */
.arrived{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.87);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px}
.arrived.show{display:flex}
</style>
</head>
<body>

<!-- ═══ SETUP ═══ -->
<div id="setup">
  <div>
    <span class="logo-e">🚌</span>
    <div class="logo-t">BUS NAV</div>
    <div class="logo-s">מערכת ניווט לנהג אוטובוס</div>
  </div>
  <div class="card">
    <span class="lbl">חברה</span>
    <div class="cops" id="cops">
      <div class="cop on" data-co="דן"        onclick="selCo(this)">דן</div>
      <div class="cop"    data-co="אגד"        onclick="selCo(this)">אגד</div>
      <div class="cop"    data-co="מטרופולין"  onclick="selCo(this)">מטרופולין</div>
      <div class="cop"    data-co="קווים"      onclick="selCo(this)">קווים</div>
      <div class="cop"    data-co="נת״ע"       onclick="selCo(this)">נת״ע</div>
    </div>
    <span class="lbl">מספר קו</span>
    <div class="row2">
      <input id="ln" type="number" inputmode="numeric" placeholder="79, 18, 480…" onkeydown="if(event.key==='Enter')doFetch()"/>
      <button class="bf" onclick="doFetch()">🔍 שלוף</button>
    </div>
    <div class="msg" id="msg"></div>
    <div id="sec" style="display:none">
      <div class="sbox">
        <div class="shdr"><span>תחנות</span><span id="stg" style="font-size:10px;color:var(--m)"></span></div>
        <div class="ss" id="sl"></div>
      </div>
    </div>
    <div style="margin-top:12px">
      <span class="lbl" style="margin-bottom:6px">הוספה ידנית</span>
      <div class="adr">
        <input id="an" type="text" placeholder="שם תחנה" onkeydown="if(event.key==='Enter')addM()"/>
        <select id="ad"><option value="s">⬆️ ישר</option><option value="r">↗️ ימינה</option><option value="l">↖️ שמאלה</option><option value="a">🛑 עצור</option></select>
        <button class="badd" onclick="addM()">＋</button>
      </div>
    </div>
  </div>
  <button class="bst" id="bst" onclick="startNav()" disabled>🚀 התחל ניווט</button>
</div>

<!-- ═══ NAV ═══ -->
<div id="nav">
  <!-- top bar -->
  <div class="tb">
    <div class="lb" id="nb">קו —</div>
    <div style="font-size:11px;color:var(--m);flex:1;text-align:center;font-weight:600" id="nm"></div>
    <div class="tr">
      <button id="vbtn" onclick="togV()" style="background:none;border:none;cursor:pointer;font-size:19px;color:var(--g);padding:0">🔊</button>
      <div class="gd" id="gd"></div>
      <span style="font-size:10px;color:var(--m);min-width:50px" id="gt">GPS…</span>
    </div>
  </div>

  <!-- GPS status bar -->
  <div class="gbar sea" id="gbar">
    <div class="gspin" id="gspin"></div>
    <span id="gtxt">מחפש GPS…</span>
  </div>

  <!-- nearest notice -->
  <div class="nn2" id="nn2"></div>

  <!-- CANVAS MAP — no external libs needed -->
  <div id="mapWrap">
    <canvas id="mapCanvas"></canvas>
    <div class="map-legend">
      <div class="leg-row"><div class="leg-dot" style="background:#ef4444"></div><span>תחנה הבאה</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#f59e0b"></div><span>תחנות קדימה</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#10b981"></div><span>תחנות שעברו</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#3b82f6;border-radius:2px;width:18px;height:4px"></div><span>כיוון לתחנה</span></div>
    </div>
  </div>

  <!-- progress -->
  <div class="pb"><div class="pbf" id="pbf" style="width:0%"></div></div>

  <!-- next stop -->
  <div class="nb">
    <div class="nbi">🚏</div>
    <div class="nbn" id="nbn">—</div>
    <div class="nbp" id="nbp"></div>
  </div>

  <!-- direction -->
  <div class="dstrip">
    <div class="darr" id="darr"><span id="darrT">⬆️</span></div>
    <div style="flex:1">
      <div class="dact" id="dact">המתן…</div>
      <div class="ddist" id="ddist">—</div>
    </div>
    <div style="text-align:center;flex-shrink:0">
      <div class="detv" id="detv">—</div>
      <div class="detl">דקות</div>
    </div>
  </div>

  <!-- sim buttons -->
  <div class="sr2">
    <button class="bn bp" onclick="sim(-1)">⏮ קודמת</button>
    <button class="bn bx" onclick="sim(1)">הבאה ⏭</button>
    <button class="bs" id="abtn" onclick="togA()">▶ אוטו׳</button>
    <button class="bs" onclick="stopNav()" style="color:var(--r)">⏹ סיום</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="arrived" id="arrived">
  <div style="font-size:64px">🏁</div>
  <div style="font-size:26px;font-weight:900;color:var(--g)">הגעת לתחנה הסופית!</div>
  <div style="font-size:14px;color:var(--m)" id="arrsub">סיום קו</div>
  <button style="background:var(--a);color:#000;border:none;padding:13px 30px;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;margin-top:8px;font-family:inherit" onclick="stopNav()">חזור</button>
</div>

// ══════════════════════════════════════════════
//  GEO HELPERS
// ══════════════════════════════════════════════
function bear(a,b,c,d){
  const f1=a*Math.PI/180,f2=c*Math.PI/180,dl=(d-b)*Math.PI/180;
  return(Math.atan2(Math.sin(dl)*Math.cos(f2),Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl))*180/Math.PI+360)%360;
}
function bdir(d){d=((d+540)%360)-180;return d>30?'r':d<-30?'l':'s';}
function hav(a,b,c,d){
  const R=6371000,da=(c-a)*Math.PI/180,db=(d-b)*Math.PI/180;
  const e=Math.sin(da/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(db/2)**2;
  return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));
}
function buildStops(raw){
  return raw.map((s,i)=>{
    let d='s';
    if(i===raw.length-1)d='a';
    else if(i>0){const b1=bear(raw[i-1].la,raw[i-1].lo,s.la,s.lo),b2=bear(s.la,s.lo,raw[i+1].la,raw[i+1].lo);d=bdir(b2-b1);}
    return{n:s.n,la:s.la,lo:s.lo,d};
  });
}

// ══════════════════════════════════════════════
//  CANVAS MAP — no external dependencies
// ══════════════════════════════════════════════
let mapView={lat:32.07,lon:34.78,zoom:14};

// Convert lat/lon to pixel on canvas
function toPixel(lat,lon,canvas,view){
  const scale=256*Math.pow(2,view.zoom)/(2*Math.PI);
  const cx=canvas.width/2,cy=canvas.height/2;
  const x=cx+scale*(lon-view.lon)*Math.PI/180;
  const latRad=lat*Math.PI/180,vlatRad=view.lat*Math.PI/180;
  const y=cy-scale*(Math.log(Math.tan(Math.PI/4+latRad/2))-Math.log(Math.tan(Math.PI/4+vlatRad/2)));
  return{x,y};
}

function drawMap(){
  const canvas=document.getElementById('mapCanvas');
  if(!canvas)return;
  const wrap=document.getElementById('mapWrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;

  // Background
  ctx.fillStyle='#0d1b2a';
  ctx.fillRect(0,0,W,H);

  // Grid (simulated streets)
  ctx.strokeStyle='rgba(30,58,95,0.4)';
  ctx.lineWidth=1;
  for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
  for(let i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

  const stopsWithCoords=stops.filter(s=>s.la);
  if(!stopsWithCoords.length)return;

  // Center map on next stop (or bus position if available)
  const center=myLat?{lat:myLat,lon:myLon}:{lat:stops[ci]?.la||32.07,lon:stops[ci]?.lo||34.78};
  mapView.lat=center.lat;mapView.lon=center.lon;

  // Draw route line (yellow dashed)
  ctx.save();
  ctx.strokeStyle='rgba(245,158,11,0.7)';
  ctx.lineWidth=4;
  ctx.setLineDash([10,6]);
  ctx.beginPath();
  let first=true;
  stopsWithCoords.forEach(s=>{
    const p=toPixel(s.la,s.lo,canvas,mapView);
    if(first){ctx.moveTo(p.x,p.y);first=false;}else ctx.lineTo(p.x,p.y);
  });
  ctx.stroke();
  ctx.restore();

  // Draw nav line: my position → next stop (blue solid)
  if(myLat&&ci<stops.length&&stops[ci].la){
    const from=toPixel(myLat,myLon,canvas,mapView);
    const to=toPixel(stops[ci].la,stops[ci].lo,canvas,mapView);
    ctx.save();
    ctx.strokeStyle='#3b82f6';
    ctx.lineWidth=4;
    ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.lineTo(to.x,to.y);ctx.stroke();
    // Arrowhead
    const ang=Math.atan2(to.y-from.y,to.x-from.x);
    const mx=(from.x+to.x)/2,my2=(from.y+to.y)/2;
    ctx.setLineDash([]);
    ctx.fillStyle='#3b82f6';
    ctx.beginPath();
    ctx.moveTo(mx+12*Math.cos(ang),my2+12*Math.sin(ang));
    ctx.lineTo(mx+5*Math.cos(ang+2.4),my2+5*Math.sin(ang+2.4));
    ctx.lineTo(mx+5*Math.cos(ang-2.4),my2+5*Math.sin(ang-2.4));
    ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // Draw stop dots
  stops.forEach((s,i)=>{
    if(!s.la)return;
    const p=toPixel(s.la,s.lo,canvas,mapView);
    let color,r;
    if(i<ci){color='#10b981';r=5;}
    else if(i===ci){color='#ef4444';r=10;}
    else{color='#f59e0b';r=7;}

    // Glow for current
    if(i===ci){
      ctx.beginPath();ctx.arc(p.x,p.y,16,0,Math.PI*2);
      ctx.fillStyle='rgba(239,68,68,0.25)';ctx.fill();
    }
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.stroke();

    // Stop number label
    ctx.fillStyle='#fff';
    ctx.font=`bold ${i===ci?11:9}px system-ui`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(i+1,p.x,p.y);

    // Stop name for current
    if(i===ci){
      const label=s.n.length>18?s.n.slice(0,16)+'…':s.n;
      const lx=p.x,ly=p.y-20;
      ctx.fillStyle='rgba(10,15,26,0.85)';
      const tw=ctx.measureText(label).width;
      ctx.fillRect(lx-tw/2-5,ly-10,tw+10,18);
      ctx.fillStyle='#ef4444';ctx.font='bold 11px system-ui';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(label,lx,ly);
    }
  });

  // Draw bus (my position)
  if(myLat){
    const p=toPixel(myLat,myLon,canvas,mapView);
    // Bus circle
    ctx.beginPath();ctx.arc(p.x,p.y,18,0,Math.PI*2);
    ctx.fillStyle='#3b82f6';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();
    // Bus emoji text
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🚌',p.x,p.y);

    // Heading indicator
    if(myHeading!=null){
      const hrad=(myHeading-90)*Math.PI/180;
      ctx.save();
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(p.x+18*Math.cos(hrad),p.y+18*Math.sin(hrad));
      ctx.lineTo(p.x+28*Math.cos(hrad),p.y+28*Math.sin(hrad));
      ctx.stroke();
      ctx.restore();
    }

    // Distance text near bus
    if(ci<stops.length&&stops[ci].la){
      const dist=hav(myLat,myLon,stops[ci].la,stops[ci].lo);
      const dtxt=dist<1000?Math.round(dist)+'מ׳':(dist/1000).toFixed(1)+'ק״מ';
      ctx.fillStyle='rgba(10,15,26,0.8)';
      ctx.fillRect(p.x-25,p.y+22,50,16);
      ctx.fillStyle='#f59e0b';ctx.font='bold 10px system-ui';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(dtxt,p.x,p.y+30);
    }
  } else {
    // No GPS yet — show current stop centered with "waiting" label
    const s=stops[ci];
    if(s?.la){
      const p=toPixel(s.la,s.lo,canvas,mapView);
      ctx.fillStyle='rgba(245,158,11,0.15)';
      ctx.strokeStyle='rgba(245,158,11,0.5)';ctx.lineWidth=1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(p.x,p.y,50,0,Math.PI*2);
      ctx.fill();ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(245,158,11,0.6)';
      ctx.font='11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('ממתין ל-GPS…',p.x,p.y+70);
    }
  }

  // Compass
  ctx.save();
  const cx2=30,cy2=H-36;
  ctx.fillStyle='rgba(10,15,26,0.7)';
  ctx.beginPath();ctx.arc(cx2,cy2,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ef4444';ctx.font='bold 14px system-ui';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('N',cx2,cy2-5);
  ctx.fillStyle='#fff';ctx.font='10px system-ui';
  ctx.fillText('S',cx2,cy2+6);
  ctx.restore();
}

let mapRafId=null;
function scheduleMapDraw(){
  if(mapRafId)return;
  mapRafId=requestAnimationFrame(()=>{mapRafId=null;drawMap();});
}

// Resize observer for canvas
function initCanvas(){
  const wrap=document.getElementById('mapWrap');
  const ro=new ResizeObserver(()=>scheduleMapDraw());
  ro.observe(wrap);
  scheduleMapDraw();
}

function selCo(el){document.querySelectorAll('.cop').forEach(p=>p.classList.remove('on'));el.classList.add('on');co=el.dataset.co;}

function doFetch(){
  const v=document.getElementById('ln').value.trim();
  if(!v){setMsg('er','הזן מספר קו');return;}
  let found=null,foundCo=null;
  for(const c in DB){if(DB[c][v]){found=DB[c][v];foundCo=c;break;}}
  if(!found){setMsg('er',`קו ${v} לא נמצא. הוסף ידנית.`);document.getElementById('sec').style.display='none';document.getElementById('bst').disabled=true;return;}
  co=foundCo;
  document.querySelectorAll('.cop').forEach(p=>p.classList.toggle('on',p.dataset.co===co));
  stops=buildStops(found.s);lineName=v;routeName=foundCo+' — '+found.n;
  setMsg('ok',`✓ קו ${v} ${foundCo} — ${stops.length} תחנות`);
  document.getElementById('stg').textContent='📍 מאגר';
  renderSetup();
}
function setMsg(t,m){const e=document.getElementById('msg');e.className='msg '+t;e.textContent=m;}

function renderSetup(){
  const sec=document.getElementById('sec'),sl=document.getElementById('sl');
  if(!stops.length){sec.style.display='none';document.getElementById('bst').disabled=true;return;}
  sec.style.display='block';

  }).join('');

function addM(){

function startNav(){
  if(stops.length<2)return;
  ci=0;spkApp=false;spkJun=false;spkArr=false;nearDone=false;
  myLat=null;myLon=null;myHeading=null;prevLat=null;prevLon=null;

function stopNav(){

// ══════════════════════════════════════════════
//  GPS
// ══════════════════════════════════════════════
function startGPS(){
  const bar=document.getElementById('gbar'),txt=document.getElementById('gtxt'),sp=document.getElementById('gspin');
  if(!navigator.geolocation){
    bar.className='gbar dn show';sp.style.display='none';
    txt.textContent='⚠️ GPS לא זמין בסביבה זו. השתמש בכפתורי הסימולציה.';
    document.getElementById('gd').classList.add('er');document.getElementById('gt').textContent='לא זמין';
    return;
  }
  bar.className='gbar sea show';sp.style.display='block';txt.textContent='מחפש מיקום GPS…';
  document.getElementById('gt').textContent='מחפש…';

  watchId=navigator.geolocation.watchPosition(pos=>{
    const{latitude:lat,longitude:lon,accuracy,speed,heading}=pos.coords;
    gpsOn=true;
    document.getElementById('gd').classList.remove('er');
    document.getElementById('gd').classList.add('on');
    document.getElementById('gt').textContent='GPS ✓';

    // Compute heading from movement if device doesn't give it
    if(heading!=null&&heading>=0){myHeading=heading;}
    else if(myLat!=null){
      const movBear=bear(myLat,myLon,lat,lon);
      if(hav(myLat,myLon,lat,lon)>5)myHeading=movBear; // only update if moved >5m
    }

    prevLat=myLat;prevLon=myLon;
    myLat=lat;myLon=lon;

    if(accuracy<120){
      bar.className='gbar fnd show';sp.style.display='none';
      txt.textContent=`✅ GPS פעיל — דיוק ${Math.round(accuracy)} מ׳`;
      setTimeout(()=>bar.classList.remove('show'),4000);
    } else {
      bar.className='gbar sea show';sp.style.display='block';
      txt.textContent=`מחכה לדיוק… (${Math.round(accuracy)} מ׳)`;
    }

    // First accurate fix — jump to nearest stop
    if(!nearDone&&accuracy<200){nearDone=true;jumpNearest(lat,lon);}

    checkProx(lat,lon,speed);
    scheduleMapDraw();

    // Update real-time heading direction in UI
    if(ci<stops.length&&stops[ci].la&&myHeading!=null){
      const dist=hav(lat,lon,stops[ci].la,stops[ci].lo);
      if(dist>R_JUN){ // far enough — show real direction
        const bearToStop=bear(lat,lon,stops[ci].la,stops[ci].lo);
        const diff=((bearToStop-myHeading+540)%360)-180;
        let ar,tx,cl;
        if(diff>25){ar='↗️';tx='פנה ימינה';cl='245,158,11';}
        else if(diff<-25){ar='↖️';tx='פנה שמאלה';cl='245,158,11';}
        else{ar='⬆️';tx='ישר קדימה';cl='59,130,246';}
        document.getElementById('darrT').textContent=ar;
        document.getElementById('dact').textContent=tx;
        document.getElementById('darr').style.background=`rgba(${cl},0.15)`;
      }
    }
  },err=>{
    gpsOn=false;
    document.getElementById('gd').classList.remove('on');
    document.getElementById('gd').classList.add('er');
    sp.style.display='none';
    bar.className='gbar dn show';
    const msgs={
      1:'❌ גישה נדחתה.\nהגדרות Safari ← פרטיות ← שירותי מיקום ← Safari ← תמיד / בזמן שימוש',
      2:'📡 מיקום לא זמין. צא לאוויר הפתוח ונסה שוב.',
      3:'⏱ פסק זמן. ודא ש-GPS מופעל ונסה שוב.',
    };
    txt.textContent=msgs[err.code]||`GPS שגיאה ${err.code}`;
    txt.style.whiteSpace='pre-line';
    document.getElementById('gt').textContent='שגיאה';
  },{enableHighAccuracy:true,maximumAge:0,timeout:30000});
}

function jumpNearest(lat,lon){
  const sorted=stops.map((s,i)=>({i,d:s.la?hav(lat,lon,s.la,s.lo):Infinity})).sort((a,b)=>a.d-b.d);
  const best=sorted[0];
  if(!best||best.d>10000)return;
  if(best.i===ci&&ci===0)return;
  ci=best.i;updateUI();
  const nn=document.getElementById('nn2');
  nn.textContent=`📍 מיקומך: ${Math.round(best.d)} מ׳ מ"${stops[ci].n}" — מתחיל מתחנה ${ci+1}`;
  nn.classList.add('show');setTimeout(()=>nn.classList.remove('show'),6000);
  spk('נמצאת ליד תחנה '+stops[ci].n+'. מתחיל מכאן.',true);
}

// ══════════════════════════════════════════════
//  PROXIMITY (3 phases)
// ══════════════════════════════════════════════
function checkProx(lat,lon,speed){
  if(ci>=stops.length)return;
  const s=stops[ci];
  if(!s.la){document.getElementById('ddist').textContent='אין קואורדינטות';return;}
  const dist=hav(lat,lon,s.la,s.lo);
  const kmh=speed?Math.round(speed*3.6):0;
  const eta=kmh>3?Math.max(1,Math.round(dist/(kmh/3.6)/60)):Math.max(1,Math.round(dist/300));
  document.getElementById('ddist').textContent='מרחק: '+(dist<1000?Math.round(dist)+' מ׳':(dist/1000).toFixed(1)+' ק״מ')+(kmh>3?' | '+kmh+' קמ״ש':'');
  document.getElementById('detv').textContent=eta;
  if(dist<R_APP&&!spkApp){spkApp=true;toast('🚏 מתקרבים: '+s.n);spk('מתקרבים לתחנה '+s.n);}
  if(dist<R_JUN&&!spkJun){spkJun=true;spk('בצומת — '+(DIR[s.d]?.sa||'ישר קדימה'),true);}
  if(dist<R_ARR&&!spkArr){
    spkArr=true;toast('🛑 עצור: '+s.n);spk('עצור בתחנה '+s.n,true);
    setTimeout(()=>{
      if(ci<stops.length-1){ci++;spkApp=false;spkJun=false;spkArr=false;updateUI();scheduleMapDraw();setTimeout(()=>spk('תחנה הבאה: '+stops[ci]?.n,true),2000);}
      else setTimeout(()=>{document.getElementById('arrived').classList.add('show');spk('הגעת לתחנה הסופית. נסיעה טובה!',true);},600);
    },1500);
  }
}

// ══════════════════════════════════════════════
//  UI UPDATE
// ══════════════════════════════════════════════
function updateUI(){
  if(ci>=stops.length)return;
  const s=stops[ci],d=DIR[s.d]||DIR.s;
  document.getElementById('darrT').textContent=d.ar;
  document.getElementById('darr').style.background=`rgba(${d.cl},0.15)`;
  document.getElementById('dact').textContent=d.tx;
  document.getElementById('nbn').textContent=s.n;
  document.getElementById('nbp').textContent=(ci+1)+' / '+stops.length;
  if(!gpsOn){document.getElementById('ddist').textContent='לחץ הבאה להדמיה';document.getElementById('detv').textContent='~2';}
  document.getElementById('pbf').style.width=(ci/Math.max(1,stops.length-1)*100)+'%';
}

// ══════════════════════════════════════════════
//  SIMULATION
// ══════════════════════════════════════════════
function sim(dir){
  ci=Math.max(0,Math.min(stops.length-1,ci+dir));
  spkApp=false;spkJun=false;spkArr=false;
  const s=stops[ci];
  if(dir>0){
    toast('🚏 '+s.n);spk('מתקרבים לתחנה '+s.n);
    setTimeout(()=>spk('בצומת — '+(DIR[s.d]?.sa||'ישר קדימה'),true),2000);
    setTimeout(()=>spk('עצור בתחנה '+s.n,true),4000);
    if(ci>=stops.length-1)setTimeout(()=>{document.getElementById('arrived').classList.add('show');spk('הגעת לתחנה הסופית. נסיעה טובה!',true);},800);
  } else {toast('⬅️ חזרה: '+s.n);spk('חוזרים לתחנה '+s.n);}
  // In sim mode, move bus to stop location on map
  if(!gpsOn&&s.la){myLat=s.la;myLon=s.lo;}
  updateUI();scheduleMapDraw();
}
function togA(){
  if(autoRun){clearInterval(autoInt);autoRun=false;document.getElementById('abtn').textContent='▶ אוטו׳';return;}
  autoRun=true;document.getElementById('abtn').textContent='⏸ עצור';
  autoInt=setInterval(()=>{
    if(ci>=stops.length-1){clearInterval(autoInt);autoRun=false;document.getElementById('abtn').textContent='▶ אוטו׳';
      setTimeout(()=>{document.getElementById('arrived').classList.add('show');spk('הגעת לתחנה הסופית. נסיעה טובה!',true);},500);return;}
    ci++;spkApp=false;spkJun=false;spkArr=false;
    if(!gpsOn&&stops[ci]?.la){myLat=stops[ci].la;myLon=stops[ci].lo;}
    updateUI();scheduleMapDraw();
    const s=stops[ci];toast('🚏 '+s.n);spk('מתקרבים לתחנה '+s.n);
    setTimeout(()=>spk('בצומת — '+(DIR[s.d]?.sa||'ישר קדימה'),true),1500);
    setTimeout(()=>spk('עצור בתחנה '+s.n,true),3000);
  },5000);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
